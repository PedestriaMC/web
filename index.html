<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pedestria</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #242f91;
            overflow: hidden;
            /* background */
        }
        .rubik-300 {
                    font-family: "Rubik", sans-serif;
                    font-optical-sizing: auto;
                    font-weight: 300;
                    font-style: normal;
                }
        /* https://css-tricks.com/classy-and-cool-custom-css-scrollbars-a-showcase/ */
        #content::-webkit-scrollbar {
            width: 5px;
        }
        #content::-webkit-scrollbar-track {
            background-color: transparent;
        }
        #content::-webkit-scrollbar-thumb {
            background: slategray;
        }
        #header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 7vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3vh;
        }
        #header-link {
            display: inline-block;
            height: 100%;
        }
        #pedestria-word-mark {
            max-height: 50%;
            height: auto;
            display: block;
        }
        #content {
            margin-top: 7vh;
            height: calc(100vh - 7vh););
            background-color: transparent;
            overflow-y: scroll;
        }
        #projects-header {
            margin-left: 10%;
            font-size: xx-large;
            color: white;
        }
    </style>

</head>
<body>
<div id="header">
    <a id="header-link" href="">
        <img id="pedestria-word-mark" src="img/pedestria-light.png" alt="Pedestria">
    </a>
</div>

<div id="content">
    <div id="projects">
        <h1 id="projects-header" class="rubik-300"></h1>
    </div>

    <br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/>

</div>

</html>
